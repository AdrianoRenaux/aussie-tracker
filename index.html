<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#E07847"/>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('au_theme')||'dark');(function(){if(localStorage.getItem('au_user')==='Charlotte')document.documentElement.setAttribute('data-user','charlotte')})()</script>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Aussie"/>
<link rel="manifest" href="manifest.json"/>
<title>Aussie Tracker 🦘</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1510;--bg2:#221c15;--bg3:#2a2318;
  --text:#f0ebe2;--text2:rgba(240,235,226,0.55);--text3:rgba(240,235,226,0.3);
  --acc:#E07847;--acc-bg:rgba(224,120,71,0.12);--acc-dim:rgba(224,120,71,0.25);
  --border:rgba(240,235,226,0.1);--border2:rgba(240,235,226,0.06);
  --radius:12px;--radius-sm:8px;
}
html[data-theme="light"]{
  --bg:#f7f3ec;--bg2:#ede8df;--bg3:#e4ddd3;
  --text:#1e1a14;--text2:rgba(30,26,20,0.58);--text3:rgba(30,26,20,0.35);
  --border:rgba(30,26,20,0.12);--border2:rgba(30,26,20,0.07);
}
/* theme toggle button */
#theme-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:color .15s,background .15s;flex-shrink:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
/* nav */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 2px 8px;cursor:pointer;gap:5px;border:none;background:none;color:var(--text3);font-size:11px;font-family:inherit;transition:color .15s;letter-spacing:.2px}
.nav-item.on{color:var(--acc)}
.nav-item i{font-size:26px}
/* page */
.page{display:none;padding:18px 14px}
.page.on{display:block}
/* cards */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:10px}
/* buttons */
btn,.btn{background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px 14px;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-acc{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:500}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:4px;font-family:inherit}
/* inputs */
.inp{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:10px;font-family:inherit;-webkit-appearance:none}
.inp:focus{outline:none;border-color:var(--acc)}
.inp::placeholder{color:var(--text3)}
select.inp option{background:var(--bg2)}
textarea.inp{resize:none}
/* pills/tags */
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.p-blue{background:rgba(52,152,219,.18);color:#5dade2}
.p-green{background:rgba(39,174,96,.18);color:#58d68d}
.p-amber{background:rgba(230,126,34,.2);color:#f0a45d}
.p-red{background:rgba(231,76,60,.18);color:#f1948a}
/* filter tabs */
.ftab{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--text2);white-space:nowrap;font-family:inherit}
.ftab.on{background:var(--acc);border-color:var(--acc);color:#fff}
.ftabs{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;padding-bottom:3px}
.ftabs::-webkit-scrollbar{display:none}
/* utils */
.row-b{display:flex;justify-content:space-between;align-items:center}
.row{display:flex;align-items:center;gap:8px}
.muted{color:var(--text2)}
.small{font-size:12px}
.t-acc{color:var(--acc)}
.mt{margin-top:8px}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:10px}
.h2{font-size:18px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* stat grid */
/* back btn */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:14px}
/* timeline */
.tl-wrap{position:relative}
.tl-line{position:absolute;left:20px;top:21px;bottom:21px;width:0.5px;background:var(--border)}
.tl-row{display:flex;gap:13px;margin-bottom:12px;position:relative;z-index:1}
.tl-dot{width:42px;height:42px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tl-dot.last{background:var(--acc-bg);border-color:var(--acc)}
/* emoji picker */
.ep{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px}
.ep-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;font-size:18px}
.ep-btn.on{border-color:var(--acc);background:var(--acc-bg)}
/* empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty i{font-size:36px;display:block;margin-bottom:10px}
/* subtabs */
.subtabs{display:flex;gap:7px;margin-bottom:16px}
.subtab{flex:1;padding:9px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;text-align:center}
.subtab.on{background:var(--acc);border-color:var(--acc);color:#fff}
/* postit */
.mdj-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:28px 22px;margin-top:6px}
.mdj-text{font-size:15px;line-height:1.8;color:var(--text)}
.mdj-from{font-size:12px;color:var(--text3);margin-top:18px;text-align:right;font-style:italic}
/* lock screen */
#lock-overlay{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;flex-direction:column;align-items:center}
.countdown{display:flex;gap:20px}
.cd-unit{text-align:center}
.cd-num{font-size:42px;font-weight:700;color:var(--acc);line-height:1;font-variant-numeric:tabular-nums;min-width:52px}
.cd-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-top:6px}
/* read-only mode */
html[data-user="charlotte"] .w-btn{display:none!important}
/* identity overlay */
#id-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
/* tutorial overlay */
#tuto-overlay{position:fixed;inset:0;z-index:9998;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:28px 20px}
.tuto-dots{display:flex;gap:7px;justify-content:center;margin-bottom:30px}
.tuto-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .25s}
.tuto-dot.on{background:var(--acc)}
/* sos overlay */
#sos-overlay{position:fixed;inset:0;z-index:9000;background:var(--bg);overflow-y:auto;padding:16px 16px calc(40px + env(safe-area-inset-bottom));display:none}
.sos-call-btn{color:var(--acc);font-size:14px;font-weight:600;text-decoration:none;display:block;margin-top:2px}
.sos-call-btn:hover{text-decoration:underline}
</style>
</head>
<body>

<!-- LOCK OVERLAY -->
<div id="lock-overlay">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;max-width:340px;width:100%">
    <div style="font-size:52px;margin-bottom:20px">🦘</div>
    <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Bientôt disponible</div>
    <div style="font-size:21px;font-weight:700;margin-bottom:32px">Disponible le 2 juillet 🦘</div>
    <div class="countdown">
      <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-label">jours</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-label">heures</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-label">min</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-label">sec</div></div>
    </div>
  </div>
  <div style="text-align:center;padding-bottom:calc(32px + env(safe-area-inset-bottom))">
    <button onclick="toggleLockCode()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;opacity:0.3;padding:10px"><i class="ti ti-lock"></i></button>
    <div id="lock-code-form" style="display:none;margin-top:6px">
      <input id="lock-code-inp" class="inp" type="password" inputmode="numeric" maxlength="4" placeholder="····" style="text-align:center;letter-spacing:8px;width:120px;margin:0 auto 10px;display:block" onkeydown="if(event.key==='Enter')tryUnlock()"/>
      <button class="btn btn-acc btn-sm" style="width:120px;justify-content:center" onclick="tryUnlock()">Entrer</button>
    </div>
  </div>
</div>

<!-- ID OVERLAY -->
<div id="id-overlay" style="display:none">
  <div style="text-align:center;max-width:320px;width:100%">
    <div style="font-size:52px;margin-bottom:16px">🦘</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:6px">Aussie Tracker</div>
    <div class="small muted" style="margin-bottom:28px">Qui utilise cette app ?</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <button class="btn" style="width:100%;justify-content:center;padding:14px;font-size:15px" onclick="selectUser('Adri')">🦘 Adri <span class="muted small" style="margin-left:6px">— Australie</span></button>
      <button class="btn" style="width:100%;justify-content:center;padding:14px;font-size:15px" onclick="selectUser('Charlotte')">🌸 Charlotte <span class="muted small" style="margin-left:6px">— France</span></button>
    </div>
  </div>
</div>

<!-- SOS OVERLAY -->
<div id="sos-overlay">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px;padding-top:env(safe-area-inset-top)">
    <button onclick="hideSOS()" style="background:none;border:none;cursor:pointer;color:var(--text);font-size:20px;padding:6px 8px 6px 0;display:flex;align-items:center"><i class="ti ti-arrow-left"></i></button>
    <div style="font-size:18px;font-weight:700">🚨 Numéros d'urgence</div>
  </div>
  <div id="sos-inner"></div>
</div>

<!-- TUTORIAL OVERLAY -->
<div id="tuto-overlay" style="display:none">
  <div id="tuto-inner" style="text-align:center;max-width:320px;width:100%"></div>
</div>

<!-- NAV -->
<nav id="nav">
  <button class="nav-item on" data-tab="home" onclick="go('home')"><i class="ti ti-home"></i>Accueil</button>
  <button class="nav-item" data-tab="jobs" onclick="go('jobs')"><i class="ti ti-briefcase"></i>Jobs</button>
  <button class="nav-item" data-tab="vocab" onclick="go('vocab')"><i class="ti ti-book"></i>Vocab</button>
  <button class="nav-item" data-tab="formation" onclick="go('formation')"><i class="ti ti-certificate"></i>Formation</button>
  <button class="nav-item" data-tab="tasks" onclick="go('tasks')"><i class="ti ti-checklist"></i>Tâches</button>
  <button class="nav-item" data-tab="parcours" onclick="go('parcours')"><i class="ti ti-map-pin"></i>Parcours</button>
  <button class="nav-item" data-tab="postit" onclick="go('postit')"><i class="ti ti-mail"></i>Post-it</button>
</nav>

<!-- PAGES -->
<div id="home" class="page on"></div>
<div id="jobs" class="page"></div>
<div id="vocab" class="page"></div>
<div id="formation" class="page"></div>
<div id="tasks" class="page"></div>
<div id="parcours" class="page"></div>
<div id="postit" class="page"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
<script>
// ─── STORAGE ─────────────────────────────────────────────
const DB = {
  get:(k,d)=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):d}catch{return d}},
  set:(k,v)=>{localStorage.setItem(k,JSON.stringify(v))}
};
const uid=()=>Math.random().toString(36).slice(2,9);

// ─── LOCK ────────────────────────────────────────────────
const UNLOCK_DATE=new Date(2026,6,2);
function checkUnlocked(){return localStorage.getItem('au_unlock')==='1'||new Date()>=UNLOCK_DATE;}
let _cdInterval=null;
function startCountdown(){
  if(_cdInterval) clearInterval(_cdInterval);
  const pad=n=>String(n).padStart(2,'0');
  function tick(){
    const diff=UNLOCK_DATE-new Date();
    if(diff<=0){document.getElementById('lock-overlay').style.display='none';return;}
    document.getElementById('cd-d').textContent=Math.floor(diff/86400000);
    document.getElementById('cd-h').textContent=pad(Math.floor((diff%86400000)/3600000));
    document.getElementById('cd-m').textContent=pad(Math.floor((diff%3600000)/60000));
    document.getElementById('cd-s').textContent=pad(Math.floor((diff%60000)/1000));
  }
  tick();_cdInterval=setInterval(tick,1000);
}
function logout(){
  localStorage.removeItem('au_user');
  localStorage.removeItem('au_unlock');
  document.documentElement.removeAttribute('data-user');
  document.getElementById('lock-code-form').style.display='none';
  document.getElementById('lock-code-inp').value='';
  document.getElementById('lock-code-inp').placeholder='····';
  document.getElementById('lock-overlay').style.display='flex';
  startCountdown();
}
function toggleLockCode(){
  const f=document.getElementById('lock-code-form');
  f.style.display=f.style.display==='none'?'block':'none';
  if(f.style.display==='block') setTimeout(()=>document.getElementById('lock-code-inp').focus(),50);
}
function tryUnlock(){
  const inp=document.getElementById('lock-code-inp');
  if(inp.value==='2811'){
    localStorage.setItem('au_unlock','1');
    document.getElementById('lock-overlay').style.display='none';
    if(!localStorage.getItem('au_user')) document.getElementById('id-overlay').style.display='flex';
  }else{inp.value='';inp.placeholder='Code incorrect…';}
}
if(checkUnlocked()) document.getElementById('lock-overlay').style.display='none';
else startCountdown();

// ─── IDENTITY ────────────────────────────────────────────
const isAdri=()=>localStorage.getItem('au_user')==='Adri';
function selectUser(name){
  localStorage.setItem('au_user',name);
  document.getElementById('id-overlay').style.display='none';
  if(name==='Charlotte'){
    document.documentElement.setAttribute('data-user','charlotte');
    if(!localStorage.getItem('au_tuto_charlotte')) showTutorial();
  } else {
    document.documentElement.removeAttribute('data-user');
  }
  renderHome();
}
function changeProfile(){
  localStorage.removeItem('au_user');
  document.documentElement.removeAttribute('data-user');
  document.getElementById('id-overlay').style.display='flex';
}
if(!localStorage.getItem('au_user')) document.getElementById('id-overlay').style.display='flex';

// ─── TUTORIAL ────────────────────────────────────────────
const TUTO_STEPS=[
  {emoji:'🌸',title:'Bienvenue Charlotte !',text:'Adri a préparé cette app pour partager son aventure australienne avec toi. Tout ce qu\'il vit là-bas, tu peux le suivre en direct depuis la France 🌏'},
  {emoji:'🗺️',title:'Explore l\'app',text:'Navigue entre les onglets en bas de l\'écran. L\'accueil te donne un résumé, tu peux voir ses tâches, son vocabulaire anglais, ses formations et son parcours.'},
  {emoji:'💌',title:'Le Post-it du jour',text:'Chaque jour, Adri t\'écrit un petit message depuis l\'Australie. Tu le retrouves dans l\'onglet Post-it — un message rien que pour toi 🥰'},
  {emoji:'❤️',title:'Montre-lui que tu penses à lui',text:'Sous son message, tu peux appuyer sur ❤️. C\'est tout petit, mais ça compte énormément pour lui. Votre petit lien, à 17 000 km de distance.'},
];
let tutoStep=0;
function showTutorial(){
  tutoStep=0;
  _renderTutoStep();
  document.getElementById('tuto-overlay').style.display='flex';
}
function _renderTutoStep(){
  const s=TUTO_STEPS[tutoStep];
  const last=tutoStep===TUTO_STEPS.length-1;
  const dots=TUTO_STEPS.map((_,i)=>`<div class="tuto-dot${i===tutoStep?' on':''}"></div>`).join('');
  document.getElementById('tuto-inner').innerHTML=`
    <div class="tuto-dots">${dots}</div>
    <div style="font-size:58px;margin-bottom:22px">${s.emoji}</div>
    <div style="font-size:21px;font-weight:700;margin-bottom:14px">${s.title}</div>
    <div class="small muted" style="line-height:1.75;margin-bottom:36px">${s.text}</div>
    <button class="btn btn-acc" style="width:100%;justify-content:center;padding:14px;font-size:15px" onclick="${last?'_finishTutorial()':'_nextTutoStep()'}">
      ${last?'Commencer 🌸':'Suivant →'}
    </button>
    ${tutoStep>0?`<button onclick="_prevTutoStep()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:10px;margin-top:6px;font-family:inherit">← Retour</button>`:''}
  `;
}
function _nextTutoStep(){if(tutoStep<TUTO_STEPS.length-1){tutoStep++;_renderTutoStep();}}
function _prevTutoStep(){if(tutoStep>0){tutoStep--;_renderTutoStep();}}
function _finishTutorial(){
  localStorage.setItem('au_tuto_charlotte','1');
  document.getElementById('tuto-overlay').style.display='none';
}

// ─── THEME ───────────────────────────────────────────────
let currentTheme='dark';
function applyTheme(t){
  currentTheme=t;
  document.documentElement.setAttribute('data-theme',t);
  const icon=document.getElementById('theme-icon');
  if(icon) icon.className='ti ti-'+(t==='light'?'moon':'sun');
}
function toggleTheme(){
  const t=currentTheme==='light'?'dark':'light';
  localStorage.setItem('au_theme',t);
  applyTheme(t);
  if(currentTab==='home') renderHome();
}
applyTheme(localStorage.getItem('au_theme')||'dark');

// ─── NAVIGATION ──────────────────────────────────────────
let currentTab='home';
function go(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  document.getElementById(tab).classList.add('on');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('on');
  currentTab=tab;
  renders[tab]();
  window.scrollTo(0,0);
}

// ─── RENDER HELPERS ──────────────────────────────────────
const h=(tag,attrs='',inner='')=>`<${tag} ${attrs}>${inner}</${tag}>`;
const ST={applied:['Candidature','p-blue'],interview:['Entretien','p-amber'],working:['En poste','p-green'],done:['Terminé','p-red']};
const CST={todo:['À faire','p-red'],in_progress:['En cours','p-amber'],done:['Obtenu','p-green']};
const PRIO={high:['Haute','ti-arrow-up','#f1948a'],mid:['Moyenne','ti-minus','#f0a45d'],low:['Basse','ti-arrow-down','#58d68d']};

// ─── HOME ─────────────────────────────────────────────────
function renderHome(){
  const jobs=DB.get('au_jobs',[]);
  const tasks=DB.get('au_tasks',[]);
  const places=DB.get('au_places',[]);
  const vocab=DB.get('au_vocab',[]);
  const lastWord=vocab.length?vocab[vocab.length-1]:null;
  const activeJobs=jobs.filter(j=>j.status!=='done').slice(0,2);
  const highTasks=tasks.filter(t=>!t.done&&t.priority==='high');
  const lastPlace=[...places].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const d=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const user=localStorage.getItem('au_user')||'';

  // ── Header ──────────────────────────────────────────────
  let html=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:30px">
      <div>
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px">${d}</div>
        <div style="font-size:26px;font-weight:700;line-height:1.1;margin-bottom:8px">🦘 Aussie Tracker</div>
        <button onclick="changeProfile()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:0;font-family:inherit;display:inline-flex;align-items:center;gap:3px">
          ${user==='Adri'?'🦘':'🌸'} ${user} <i class="ti ti-chevron-down" style="font-size:9px"></i>
        </button>
      </div>
      <button id="theme-btn" onclick="toggleTheme()" aria-label="Changer de thème" style="margin-top:4px"><i id="theme-icon" class="ti ti-${currentTheme==='light'?'moon':'sun'}"></i></button>
    </div>`;

  // Pour Charlotte, le Post-it s'affiche en premier
  if(!isAdri()) html+='<div id="home-mdj"></div>';

  // ── JOBS ────────────────────────────────────────────────
  html+=`<div class="sec-title"${!isAdri()?' style="margin-top:28px"':''}>Jobs</div>`;
  if(activeJobs.length){
    html+=activeJobs.map(j=>`
      <div class="card" style="padding:18px 20px;cursor:pointer;margin-bottom:10px" onclick="go('jobs')">

      <div class="card" style="padding:16px 20px;margin-bottom:8px;border-color:rgba(241,148,138,0.4);background:rgba(241,148,138,0.06);cursor:pointer" onclick="go('tasks')">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:16px;flex-shrink:0">🔴</span>

      </div>`).join('');
  }

  // ── PARCOURS ────────────────────────────────────────────
  if(lastPlace){
    html+=`<div class="sec-title" style="margin-top:28px">Parcours</div>
    <div class="card" style="padding:18px 20px;cursor:pointer" onclick="go('parcours')">
      <div style="display:flex;align-items:center;gap:14px">
        <span style="font-size:30px;flex-shrink:0">${lastPlace.emoji||'📍'}</span>
        <div>
          <div style="font-size:15px;font-weight:600;margin-bottom:3px">${lastPlace.location}</div>
          <div class="small muted">${lastPlace.date}${lastPlace.duration?' · '+lastPlace.duration:''}</div>
        </div>
        <i class="ti ti-chevron-right" style="margin-left:auto;color:var(--text3)"></i>
      </div>
    </div>`;
  }

  // ── VOCABULAIRE ─────────────────────────────────────────
  if(lastWord){
    html+=`<div class="sec-title" style="margin-top:28px">Vocabulaire</div>
    <div class="card" style="padding:18px 20px;cursor:pointer" onclick="go('vocab')">
      <div style="font-size:18px;font-weight:700;margin-bottom:5px">${lastWord.word}</div>
      <div style="font-size:14px;color:var(--text2)">${lastWord.translation}</div>
      ${lastWord.category?`<div class="small muted" style="margin-top:8px">${lastWord.category}</div>`:''}
    </div>`;
  }

  // ── SOS ─────────────────────────────────────────────────
  const sosHtml=`
    <div class="sec-title" style="margin-top:28px">Urgences</div>
    <div class="card" style="padding:18px 20px;cursor:pointer;border-color:rgba(241,148,138,0.35);background:rgba(241,148,138,0.06)" onclick="showSOS()">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:42px;height:42px;border-radius:10px;background:rgba(231,76,60,0.18);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🚨</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:600">Numéros d'urgence</div>
          <div class="small muted" style="margin-top:3px">000 · Ambassade · Police…</div>
        </div>
        <i class="ti ti-chevron-right" style="color:var(--text3)"></i>
      </div>
    </div>`;

  const logoutHtml=`
    <div style="text-align:center;margin-top:36px;padding-bottom:4px">
      <button onclick="logout()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;font-family:inherit;display:inline-flex;align-items:center;gap:5px;padding:8px;opacity:0.6">
        <i class="ti ti-logout" style="font-size:14px"></i> Se déconnecter
      </button>
    </div>`;

  // Pour Adri, le placeholder Post-it s'insère entre vocab et SOS
  document.getElementById('home').innerHTML=html+(isAdri()?'<div id="home-mdj"></div>':'')+sosHtml+logoutHtml;

  // ── POST-IT (async) ─────────────────────────────────────
  fbRef.once('value',snap=>{
    const wrap=document.getElementById('home-mdj');
    if(!wrap)return;
    const data=snap.val();
    if(!data)return;
    const adri=isAdri();
    const label=adri?'💌 Ton mot du jour':'💌 Message d\'Adri';
    const reaction=adri
      ?(data.liked?`<div class="small t-acc" style="margin-top:10px">Charlotte a ❤️ ton message</div>`:`<div class="small muted" style="margin-top:10px">En attente de réaction…</div>`)
      :(data.liked?`<div class="small t-acc" style="margin-top:10px">Tu as ❤️ ce message</div>`:`<div class="small muted" style="margin-top:10px">Appuie pour réagir 💌</div>`);
    wrap.innerHTML=`
      <div class="sec-title" style="margin-top:${isAdri()?'28px':'0'}">Post-it</div>
      <div class="card" style="padding:18px 20px;cursor:pointer" onclick="go('postit')">
        <div class="small muted" style="margin-bottom:8px">${label}</div>
        <div style="font-size:14px;line-height:1.7">${esc(data.text)}</div>
        ${reaction}
      </div>`;
  });
}

let jobsView='list', jobsSel=null, jobsFilter='all';

        <div class="row-b" style="margin-bottom:8px">
          <div style="font-size:16px;font-weight:600">${j.title}</div>
          <span class="pill ${ST[j.status][1]}">${ST[j.status][0]}</span>
        </div>
        ${j.company?`<div class="small muted"><i class="ti ti-building"></i> ${j.company}</div>`:''}
        ${j.location?`<div class="small muted"><i class="ti ti-map-pin"></i> ${j.location}</div>`:''}
        ${j.type?`<div class="small muted"><i class="ti ti-tag"></i> ${j.type}</div>`:''}
        ${j.notes?`<div style="font-size:13px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">${j.notes}</div>`:''}
      </div>
      <div class="sec-title w-btn">Statut</div>
      <div class="ftabs w-btn">${Object.entries(ST).map(([k,[v]])=>`<button class="ftab ${j.status===k?'on':''}" onclick="updateJobStatus('${j.id}','${k}')">${v}</button>`).join('')}</div>
      <div class="row-b" style="margin-bottom:10px">
        <div style="font-size:14px;font-weight:500"><i class="ti ti-message-circle"></i> Commentaires (${(j.comments||[]).length})</div>
        <button class="btn btn-acc btn-sm w-btn" onclick="toggleCmtForm('${j.id}')">+ Ajouter</button>
      </div>
      <div id="cmt-form-${j.id}" style="display:none" class="card w-btn">
        <textarea class="inp" id="cmt-txt-${j.id}" placeholder="Commentaire..." rows="3"></textarea>
        <button class="btn btn-acc" style="width:100%" onclick="saveComment('${j.id}')">Enregistrer</button>
      </div>
      ${(j.comments||[]).length===0?`<div class="empty"><i class="ti ti-message-circle"></i>Aucun commentaire</div>`:
        (j.comments||[]).map(c=>`<div class="card"><div style="font-size:13px">${c.text}</div><div class="small muted" style="margin-top:5px">${c.date}</div></div>`).join('')}`;
    return;
  }

  el.innerHTML=`
    <div class="row-b" style="margin-bottom:12px">
      <div class="h2" style="margin-bottom:0"><i class="ti ti-briefcase"></i>Jobs</div>
      <button class="btn btn-acc btn-sm w-btn" onclick="jobsView='add';renderJobs()">+ Nouveau</button>
    </div>
    <div class="ftabs">
      ${[['all','Tous'],['applied','Candidatures'],['interview','Entretiens'],['working','En poste'],['done','Terminés']]
        .map(([k,v])=>`<button class="ftab ${jobsFilter===k?'on':''}" onclick="jobsFilter='${k}';renderJobs()">${v}</button>`).join('')}
    </div>

      filtered.map(j=>`
        <div class="card" style="cursor:pointer" onclick="jobsSel='${j.id}';jobsView='detail';renderJobs()">
          <div class="row-b">
            <div>
              <div style="font-weight:500">${j.title}</div>
              <div class="small muted">${[j.company,j.location].filter(Boolean).join(' · ')||'—'}</div>
            </div>
            <span class="pill ${ST[j.status][1]}">${ST[j.status][0]}</span>
          </div>
          ${(j.comments||[]).length?`<div class="small muted" style="margin-top:7px"><i class="ti ti-message-circle"></i> ${j.comments.length} commentaire${j.comments.length>1?'s':''}</div>`:''}
        </div>`).join('')}`;
}
function saveJob(){
  if(!isAdri())return;
  const t=document.getElementById('j-title').value.trim();
  if(!t)return;
  const jobs=DB.get('au_jobs',[]);
  jobs.push({id:uid(),title:t,company:document.getElementById('j-company').value,type:document.getElementById('j-type').value,location:document.getElementById('j-loc').value,status:document.getElementById('j-status').value,notes:document.getElementById('j-notes').value,comments:[],createdAt:new Date().toLocaleDateString('fr-FR')});
  DB.set('au_jobs',jobs);jobsView='list';renderJobs();
}
function deleteJob(id){if(!isAdri())return;const jobs=DB.get('au_jobs',[]).filter(j=>j.id!==id);DB.set('au_jobs',jobs);jobsView='list';renderJobs();}
function updateJobStatus(id,status){if(!isAdri())return;const jobs=DB.get('au_jobs',[]).map(j=>j.id===id?{...j,status}:j);DB.set('au_jobs',jobs);renderJobs();}
function toggleCmtForm(id){const f=document.getElementById('cmt-form-'+id);f.style.display=f.style.display==='none'?'block':'none';}
function saveComment(id){
  const txt=document.getElementById('cmt-txt-'+id).value.trim();
  if(!txt)return;
  const jobs=DB.get('au_jobs',[]).map(j=>j.id===id?{...j,comments:[...(j.comments||[]),{id:uid(),text:txt,date:new Date().toLocaleDateString('fr-FR')}]}:j);
  DB.set('au_jobs',jobs);jobsSel=id;renderJobs();
}

let vocabView='list',vocabFilter='all',quizIdx=0;
const VCATS=['général','travail','mine','farm','hospo','slang'];
const vocabCats=()=>[...VCATS,...DB.get('au_vcats',[])];
function renderVocab(){
  const el=document.getElementById('vocab');
  const vocab=DB.get('au_vocab',[]);
  const unlearned=vocab.filter(v=>!v.learned);

  if(vocabView==='add'){
    el.innerHTML=`
      <button class="back-btn" onclick="vocabView='list';renderVocab()"><i class="ti ti-arrow-left"></i>Retour</button>

      <input class="inp" id="v-word" placeholder="Mot en anglais *"/>

      <select class="inp" id="v-cat">${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>

  }

    const custom=DB.get('au_vcats',[]);
    el.innerHTML=`
      <button class="back-btn" onclick="vocabView='list';renderVocab()"><i class="ti ti-arrow-left"></i>Retour</button>
      <div class="h2"><i class="ti ti-tag"></i>Catégories</div>
      <div class="sec-title">Par défaut</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px">
        ${VCATS.map(c=>`<span style="padding:5px 12px;border-radius:20px;background:var(--bg3);font-size:13px;color:var(--text2)">${c}</span>`).join('')}
      </div>
      <div class="sec-title">Mes catégories</div>
      ${custom.length===0?`<div class="small muted" style="margin-bottom:14px">Aucune catégorie personnalisée</div>`:''}
      ${custom.map(c=>`
        <div class="card row" style="margin-bottom:7px;justify-content:space-between">
          <span style="font-size:14px">${c}</span>
          <button class="btn-icon w-btn" onclick="deleteVCat('${c}')"><i class="ti ti-trash" style="font-size:16px"></i></button>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:8px">
        <input class="inp" id="vcat-inp" placeholder="Nouvelle catégorie…" style="margin-bottom:0;flex:1" onkeydown="if(event.key==='Enter')addVCat()"/>
        <button class="btn btn-acc w-btn" onclick="addVCat()"><i class="ti ti-plus"></i></button>
      </div>`;
    return;
  }
  if(vocabView==='quiz'){
    if(unlearned.length===0){el.innerHTML=`<button class="back-btn" onclick="vocabView='list';renderVocab()"><i class="ti ti-arrow-left"></i>Retour</button><div class="empty"><i class="ti ti-trophy"></i>Tous les mots sont appris !</div>`;return;}
    const card=unlearned[quizIdx%unlearned.length];
    el.innerHTML=`
      <div class="row-b" style="margin-bottom:18px">
        <button class="back-btn" onclick="vocabView='list';quizIdx=0;renderVocab()" style="margin-bottom:0"><i class="ti ti-arrow-left"></i>Retour</button>
        <span class="small muted">${quizIdx%unlearned.length+1} / ${unlearned.length}</span>
      </div>
      <div class="card" style="text-align:center;padding:28px 18px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:10px">${card.category}</div>
        <div style="font-size:26px;font-weight:700;margin-bottom:6px">${card.word}</div>
        <div id="quiz-reveal" style="display:none">
          <div style="height:1px;background:var(--border);margin:14px 0"></div>
          <div style="font-size:17px;margin-bottom:6px">${card.translation}</div>
          ${card.example?`<div style="font-size:12px;color:var(--text2);font-style:italic">« ${card.example} »</div>`:''}
          <div style="display:flex;gap:10px;justify-content:center;margin-top:18px">
            <button class="btn" onclick="quizIdx++;renderVocab()">Suivant</button>
            <button class="btn btn-acc w-btn" onclick="learnWord('${card.id}')"><i class="ti ti-check"></i>Appris</button>
          </div>
        </div>
        <button id="quiz-btn" class="btn btn-acc" style="margin-top:18px" onclick="document.getElementById('quiz-reveal').style.display='block';document.getElementById('quiz-btn').style.display='none'">Révéler</button>
      </div>`;
    return;
  }
  const filtered=vocabFilter==='all'?vocab:vocabFilter==='unlearned'?unlearned:vocab.filter(v=>v.category===vocabFilter);
  el.innerHTML=`
    <div class="row-b" style="margin-bottom:10px">
      <div class="h2" style="margin-bottom:0"><i class="ti ti-book"></i>Vocabulaire</div>
      <div class="row">
        ${unlearned.length?`<button class="btn btn-sm w-btn" onclick="vocabView='quiz';quizIdx=0;renderVocab()">Quiz</button>`:''}
        <button class="btn btn-sm w-btn" onclick="vocabView='cats';renderVocab()" style="padding:5px 10px"><i class="ti ti-tag" style="font-size:14px"></i></button>
        <button class="btn btn-acc btn-sm w-btn" onclick="vocabView='add';renderVocab()">+</button>
      </div>
    </div>
    <div class="small muted" style="margin-bottom:11px">${vocab.filter(v=>v.learned).length} / ${vocab.length} mots appris</div>
    <div class="ftabs">
      ${[['all','Tous'],['unlearned','À apprendre'],...cats.map(c=>[c,c])].map(([k,v])=>`<button class="ftab ${vocabFilter===k?'on':''}" onclick="vocabFilter='${k}';renderVocab()">${v}</button>`).join('')}
    </div>
    ${filtered.length===0?`<div class="empty"><i class="ti ti-book"></i>Aucun mot</div>`:
      filtered.map(w=>`

            </div>
            <div class="small muted">${w.translation}</div>
            ${w.example?`<div style="font-size:11px;color:var(--text3);font-style:italic">« ${w.example} »</div>`:''}
          </div>
          <button class="btn-icon w-btn" onclick="toggleLearn('${w.id}')"><i class="ti ${w.learned?'ti-circle-check':'ti-circle'}" style="color:${w.learned?'#58d68d':'var(--text3)'}"></i></button>
          <button class="btn-icon w-btn" onclick="deleteVocab('${w.id}')"><i class="ti ti-trash"></i></button>
        </div>`).join('')}`;
}
function saveVocab(){if(!isAdri())return;const w=document.getElementById('v-word').value.trim();if(!w)return;const v=DB.get('au_vocab',[]);v.push({id:uid(),word:w,translation:document.getElementById('v-trad').value,example:document.getElementById('v-ex').value,category:document.getElementById('v-cat').value,learned:false});DB.set('au_vocab',v);vocabView='list';renderVocab();}
function toggleLearn(id){if(!isAdri())return;const v=DB.get('au_vocab',[]).map(x=>x.id===id?{...x,learned:!x.learned}:x);DB.set('au_vocab',v);renderVocab();}
function learnWord(id){toggleLearn(id);quizIdx++;renderVocab();}
function deleteVocab(id){if(!isAdri())return;DB.set('au_vocab',DB.get('au_vocab',[]).filter(v=>v.id!==id));renderVocab();}
function addVCat(){if(!isAdri())return;const inp=document.getElementById('vcat-inp');const val=(inp.value||'').trim().toLowerCase();if(!val)return;const cats=DB.get('au_vcats',[]);if(cats.includes(val)||VCATS.includes(val))return;cats.push(val);DB.set('au_vcats',cats);inp.value='';renderVocab();}
function deleteVCat(c){if(!isAdri())return;DB.set('au_vcats',DB.get('au_vcats',[]).filter(x=>x!==c));if(vocabFilter===c)vocabFilter='all';renderVocab();}

      ${custom.length===0?`<div class="small muted" style="margin-bottom:14px">Aucune catégorie personnalisée</div>`:''}
      ${custom.map(c=>`
        <div class="card row" style="margin-bottom:7px;justify-content:space-between">
          <span style="font-size:14px">${c}</span>
          <button class="btn-icon w-btn" onclick="deleteCCat('${c}')"><i class="ti ti-trash" style="font-size:16px"></i></button>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:8px">
        <input class="inp" id="ccat-inp" placeholder="Nouvelle catégorie…" style="margin-bottom:0;flex:1" onkeydown="if(event.key==='Enter')addCCat()"/>
        <button class="btn btn-acc w-btn" onclick="addCCat()"><i class="ti ti-plus"></i></button>
      </div>`;
    return;
  }
  if(formView==='add-exp'){
    el.innerHTML=`
      <button class="back-btn" onclick="formView='list';renderFormation()"><i class="ti ti-arrow-left"></i>Retour</button>
      <div class="h2"><i class="ti ti-coin"></i>Nouvelle dépense</div>
      <input class="inp" id="e-desc" placeholder="Description *"/>
      <input class="inp" type="number" id="e-amt" placeholder="Montant (AUD) *"/>
      <select class="inp" id="e-cat">${ECATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      <input class="inp" type="date" id="e-date" value="${new Date().toISOString().slice(0,10)}"/>
      <button class="btn btn-acc" style="width:100%" onclick="saveExpense()">Enregistrer</button>`;
    return;
  }
  const totalDep=expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const bycat=expenses.reduce((a,e)=>{a[e.category]=(a[e.category]||0)+(parseFloat(e.amount)||0);return a;},{});
  el.innerHTML=`
    <div class="h2"><i class="ti ti-certificate"></i>Formation</div>
    <div class="subtabs">
      <button class="subtab ${formSub==='certifs'?'on':''}" onclick="formSub='certifs';renderFormation()">Certifications</button>
      <button class="subtab ${formSub==='expenses'?'on':''}" onclick="formSub='expenses';renderFormation()">Dépenses</button>
    </div>
    ${formSub==='certifs'?`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
        <button class="btn btn-sm w-btn" onclick="formView='cats-certif';renderFormation()"><i class="ti ti-tag"></i> Catégories</button>
        <button class="btn btn-acc btn-sm w-btn" onclick="formView='add-certif';formEditId=null;renderFormation()">+ Ajouter</button>
      </div>
      ${certifs.length===0?`<div class="empty"><i class="ti ti-certificate"></i>Aucune certification</div>`:
        certifs.map(c=>`
          <div class="card">
            <div class="row-b" style="margin-bottom:6px">
              <div style="font-weight:500;flex:1">${c.name}</div>
              <span class="pill ${CST[c.status][1]}">${CST[c.status][0]}</span>
            </div>
            ${c.category?`<span style="font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--text3);display:inline-block;margin-bottom:5px">${c.category}</span>`:''}
            ${c.date?`<div class="small muted"><i class="ti ti-calendar"></i> ${c.date}</div>`:''}
            ${c.cost?`<div class="small t-acc" style="margin-top:2px">${parseFloat(c.cost).toFixed(2)} AUD</div>`:''}
            ${c.notes?`<div class="small muted" style="margin-top:4px">${c.notes}</div>`:''}
            <div class="row-b" style="margin-top:10px">
              <select class="inp w-btn" style="margin-bottom:0;font-size:11px;padding:4px 8px;width:auto" onchange="updateCertifStatus('${c.id}',this.value)">
                ${Object.entries(CST).map(([k,[v]])=>`<option value="${k}" ${c.status===k?'selected':''}>${v}</option>`).join('')}
              </select>
              <div style="display:flex;gap:4px">
                <button class="btn btn-sm w-btn" onclick="editCertif('${c.id}')"><i class="ti ti-pencil"></i></button>
                <button class="btn btn-sm w-btn" style="color:#f1948a" onclick="deleteCertif('${c.id}')"><i class="ti ti-trash"></i></button>
              </div>
            </div>
          </div>`).join('')}`
    :`
      <div style="background:rgba(230,126,34,.12);border:0.5px solid rgba(230,126,34,.3);border-radius:var(--radius);padding:13px 15px;margin-bottom:14px">
        <div class="small" style="color:var(--acc);margin-bottom:3px">Total</div>
        <div style="font-size:24px;font-weight:700;color:var(--acc)">${totalDep.toFixed(2)} AUD</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">
          ${Object.entries(bycat).map(([cat,amt])=>`<span style="font-size:11px;padding:2px 7px;border-radius:4px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border)">${cat}: ${Math.round(amt)}</span>`).join('')}
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:11px">
        <button class="btn btn-acc btn-sm w-btn" onclick="formView='add-exp';renderFormation()">+ Dépense</button>
      </div>
      ${expenses.length===0?`<div class="empty"><i class="ti ti-coin"></i>Aucune dépense</div>`:
        [...expenses].reverse().map(e=>`
          <div class="card">
            <div class="row-b">
              <div>
                <div style="font-weight:500">${e.description}</div>
                <div class="small muted">${e.category} · ${e.date}</div>
              </div>
              <div class="row">
                <span style="font-weight:500;color:var(--acc)">${parseFloat(e.amount).toFixed(2)}</span>
                <button class="btn-icon w-btn" onclick="deleteExpense('${e.id}')"><i class="ti ti-trash"></i></button>
              </div>
            </div>
          </div>`).join('')}`}`;
}
function saveCertif(){
  if(!isAdri())return;
  const n=document.getElementById('c-name').value.trim();
  if(!n)return;
  const data={name:n,category:document.getElementById('c-cat').value,status:document.getElementById('c-status').value,date:document.getElementById('c-date').value,cost:document.getElementById('c-cost').value,notes:document.getElementById('c-notes').value};
  const certifs=DB.get('au_certifs',[]);
  if(formEditId){DB.set('au_certifs',certifs.map(c=>c.id===formEditId?{...c,...data}:c));}
  else{certifs.push({id:uid(),...data});DB.set('au_certifs',certifs);}
  formEditId=null;formView='list';renderFormation();
}
function editCertif(id){if(!isAdri())return;formEditId=id;formView='edit-certif';renderFormation();}
function deleteCertif(id){if(!isAdri())return;DB.set('au_certifs',DB.get('au_certifs',[]).filter(c=>c.id!==id));renderFormation();}
function saveExpense(){if(!isAdri())return;const d=document.getElementById('e-desc').value.trim(),a=document.getElementById('e-amt').value;if(!d||!a)return;const e=DB.get('au_expenses',[]);e.push({id:uid(),description:d,amount:a,category:document.getElementById('e-cat').value,date:document.getElementById('e-date').value});DB.set('au_expenses',e);formView='list';renderFormation();}
function updateCertifStatus(id,s){if(!isAdri())return;DB.set('au_certifs',DB.get('au_certifs',[]).map(c=>c.id===id?{...c,status:s}:c));renderFormation();}
function deleteExpense(id){if(!isAdri())return;DB.set('au_expenses',DB.get('au_expenses',[]).filter(e=>e.id!==id));renderFormation();}
function addCCat(){if(!isAdri())return;const inp=document.getElementById('ccat-inp');const val=(inp.value||'').trim().toLowerCase();if(!val)return;const cats=DB.get('au_ccats',[]);if(cats.includes(val)||CCATS.includes(val))return;cats.push(val);DB.set('au_ccats',cats);inp.value='';renderFormation();}
function deleteCCat(c){if(!isAdri())return;DB.set('au_ccats',DB.get('au_ccats',[]).filter(x=>x!==c));renderFormation();}

// ─── TASKS ────────────────────────────────────────────────
let tasksView='list',tasksFilter='todo';
const TCATS=['général','visa','job','logement','santé','admin','voyage'];
function renderTasks(){
  const el=document.getElementById('tasks');
  const tasks=DB.get('au_tasks',[]);
  if(tasksView==='add'){
    el.innerHTML=`
      <button class="back-btn" onclick="tasksView='list';renderTasks()"><i class="ti ti-arrow-left"></i>Retour</button>
      <div class="h2"><i class="ti ti-checklist"></i>Nouvelle tâche</div>
      <input class="inp" id="t-text" placeholder="Tâche *"/>
      <select class="inp" id="t-cat">${TCATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      <div style="margin-bottom:13px">
        <div class="small muted" style="margin-bottom:7px">Priorité</div>
        <div style="display:flex;gap:7px">
          ${Object.entries(PRIO).map(([k,[label,icon,color]])=>`
            <button class="ftab" id="prio-${k}" onclick="selectPrio('${k}')" style="flex:1;text-align:center">
              <i class="ti ${icon}" style="color:${color};font-size:11px"></i> ${label}
            </button>`).join('')}
        </div>
      </div>
      <input type="hidden" id="t-prio" value="mid"/>
      <button class="btn btn-acc" style="width:100%" onclick="saveTask()">Enregistrer</button>`;
    setTimeout(()=>selectPrio('mid'),0);
    return;
  }
  const filtered=tasksFilter==='all'?tasks:tasksFilter==='todo'?tasks.filter(t=>!t.done):tasks.filter(t=>t.done);
  el.innerHTML=`
    <div class="row-b" style="margin-bottom:13px">
      <div class="h2" style="margin-bottom:0"><i class="ti ti-checklist"></i>Tâches</div>
      <button class="btn btn-acc btn-sm w-btn" onclick="tasksView='add';renderTasks()">+ Ajouter</button>
    </div>
    <div class="ftabs">
      ${[['todo',`À faire (${tasks.filter(t=>!t.done).length})`],['done','Faites'],['all','Toutes']].map(([k,v])=>`<button class="ftab ${tasksFilter===k?'on':''}" style="flex:1;text-align:center;font-size:11px" onclick="tasksFilter='${k}';renderTasks()">${v}</button>`).join('')}
    </div>
    ${filtered.length===0?`<div class="empty"><i class="ti ti-checklist"></i>Aucune tâche</div>`:
      filtered.map(t=>`
        <div class="card" style="display:flex;align-items:center;gap:11px;opacity:${t.done?0.6:1}">
          <button class="btn-icon w-btn" onclick="toggleTask('${t.id}')">
            <i class="ti ${t.done?'ti-circle-check':'ti-circle'}" style="font-size:20px;color:${t.done?'#58d68d':'var(--text3)'}"></i>
          </button>
          <div style="flex:1">
            <div style="font-size:13px;text-decoration:${t.done?'line-through':'none'}">${t.text}</div>
            <div class="small muted" style="margin-top:2px;display:flex;align-items:center;gap:5px">
              <i class="ti ${PRIO[t.priority][1]}" style="color:${PRIO[t.priority][2]}"></i>${t.category}
            </div>
          </div>
          <button class="btn-icon w-btn" onclick="deleteTask('${t.id}')"><i class="ti ti-trash"></i></button>
        </div>`).join('')}`;
}
function selectPrio(k){document.getElementById('t-prio').value=k;document.querySelectorAll('[id^="prio-"]').forEach(b=>b.classList.remove('on'));const btn=document.getElementById('prio-'+k);if(btn)btn.classList.add('on');}
function saveTask(){if(!isAdri())return;const t=document.getElementById('t-text').value.trim();if(!t)return;const tasks=DB.get('au_tasks',[]);tasks.push({id:uid(),text:t,category:document.getElementById('t-cat').value,priority:document.getElementById('t-prio').value,done:false});DB.set('au_tasks',tasks);tasksView='list';renderTasks();}
function toggleTask(id){if(!isAdri())return;DB.set('au_tasks',DB.get('au_tasks',[]).map(t=>t.id===id?{...t,done:!t.done}:t));renderTasks();}
function deleteTask(id){if(!isAdri())return;DB.set('au_tasks',DB.get('au_tasks',[]).filter(t=>t.id!==id));renderTasks();}

// ─── PARCOURS ─────────────────────────────────────────────
let parcoursView='list',selEmoji='📍';
const EMOJIS=['📍','🏙️','🌊','🏔️','🌾','🦘','🐊','🏖️','🌿','⛏️','🍺','🌅','🐠','🎪'];
function renderParcours(){
  const el=document.getElementById('parcours');
  const places=DB.get('au_places',[]);
  if(parcoursView==='add'){
    el.innerHTML=`
      <button class="back-btn" onclick="parcoursView='list';renderParcours()"><i class="ti ti-arrow-left"></i>Retour</button>
      <div class="h2"><i class="ti ti-map-pin"></i>Nouveau lieu</div>
      <input class="inp" id="p-loc" placeholder="Nom du lieu *"/>
      <input class="inp" type="date" id="p-date" value="${new Date().toISOString().slice(0,10)}"/>
      <input class="inp" id="p-dur" placeholder="Durée (ex : 2 semaines)"/>
      <textarea class="inp" id="p-notes" placeholder="Notes, souvenirs..." rows="3"></textarea>
      <div style="margin-bottom:13px">
        <div class="small muted" style="margin-bottom:8px">Ambiance</div>
        <div class="ep">${EMOJIS.map(e=>`<button class="ep-btn ${e==='📍'?'on':''}" id="ep-${e.codePointAt(0)}" onclick="pickEmoji('${e}')">${e}</button>`).join('')}</div>
      </div>
      <button class="btn btn-acc" style="width:100%" onclick="savePlace()">Enregistrer</button>`;
    return;
  }
  const sorted=[...places].sort((a,b)=>new Date(a.date)-new Date(b.date));
  el.innerHTML=`
    <div class="row-b" style="margin-bottom:18px">
      <div class="h2" style="margin-bottom:0"><i class="ti ti-map-pin"></i>Parcours</div>
      <button class="btn btn-acc btn-sm w-btn" onclick="parcoursView='add';selEmoji='📍';renderParcours()">+ Lieu</button>
    </div>
    ${places.length===0?`<div class="empty"><i class="ti ti-world"></i>Ton aventure commence ici 🌏</div>`:`
      <div class="tl-wrap">
        ${sorted.length>1?'<div class="tl-line"></div>':''}
        ${sorted.map((p,i)=>`
          <div class="tl-row">
            <div class="tl-dot ${i===sorted.length-1?'last':''}">${p.emoji||'📍'}</div>
            <div class="card" style="flex:1;margin-bottom:0">
              <div class="row-b">
                <div>
                  <div style="font-weight:500">${p.location}</div>
                  <div class="small muted">${p.date}${p.duration?' · '+p.duration:''}</div>
                  ${p.notes?`<div style="font-size:12px;color:var(--text2);margin-top:5px">${p.notes}</div>`:''}
                </div>
                <button class="btn-icon w-btn" onclick="deletePlace('${p.id}')"><i class="ti ti-trash"></i></button>
              </div>
            </div>
          </div>`).join('')}
      </div>`}`;
}
function pickEmoji(e){selEmoji=e;document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('on'));const btn=document.getElementById('ep-'+e.codePointAt(0));if(btn)btn.classList.add('on');}
function savePlace(){if(!isAdri())return;const l=document.getElementById('p-loc').value.trim();if(!l)return;const p=DB.get('au_places',[]);p.push({id:uid(),location:l,date:document.getElementById('p-date').value,duration:document.getElementById('p-dur').value,notes:document.getElementById('p-notes').value,emoji:selEmoji});DB.set('au_places',p);parcoursView='list';renderParcours();}
function deletePlace(id){if(!isAdri())return;DB.set('au_places',DB.get('au_places',[]).filter(p=>p.id!==id));renderParcours();}

function renderPostit(){
  const el=document.getElementById('postit');
  const user=localStorage.getItem('au_user')||'';
  fbRef.off();
  el.innerHTML=`
    <div style="margin-bottom:20px">
      <div class="h2" style="margin-bottom:0">💌 Post-it</div>
    </div>

      <div class="sec-title" style="margin-top:20px">Nouveau message</div>

        <i class="ti ti-send"></i> Envoyer à Charlotte
      </button>`:''}`;

    const display=document.getElementById('mdj-display');

      display.innerHTML=isAdri()
        ?`<div class="empty"><i class="ti ti-mail"></i><div>Aucun message envoyé</div></div>`

      display.innerHTML=`

        </button>`;

      display.innerHTML=`

          <div style="padding:22px 22px 24px">
            <div class="mdj-text">${esc(data.text)}</div>
            <div class="mdj-from">— Adri · ${date}</div>

            </button>
          </div>
        </div>`;
    }
  });
}
function likeMotDuJour(){
  fbRef.update({liked:true});
}
function deleteMotDuJour(){
  if(!isAdri())return;
  fbRef.remove();
}
function saveMotDuJour(){
  if(!isAdri())return;
  const inp=document.getElementById('mdj-inp');
  const text=(inp?.value||'').trim();
  if(!text)return;
  fbRef.set({text,ts:Date.now(),author:'Adri',liked:false});
  inp.value='';
}

function addSosContact(){
  const emoji=(document.getElementById('sos-emoji').value.trim()||'📞');
  const name=document.getElementById('sos-name').value.trim();
  const number=document.getElementById('sos-number').value.trim();
  if(!name||!number)return;
  const contacts=DB.get('au_sos',[]);
  contacts.push({id:uid(),emoji,name,number});
  DB.set('au_sos',contacts);
  renderSOS();
}
function deleteSosContact(id){
  DB.set('au_sos',DB.get('au_sos',[]).filter(c=>c.id!==id));

}
